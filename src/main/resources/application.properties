spring.application.name=feecalculator
server.port={server_port}

# Database - use environment variables in production (DB_URL, DB_USERNAME, DB_PASSWORD)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:{jdbc_port_number}/MARKET_FEE}
spring.datasource.username=${DB_USERNAME:{db_username}}
spring.datasource.password=${DB_PASSWORD:{db_password}}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Development defaults - override in application-prod.properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
